<!DOCTYPE html>
<html lang="fr" data-theme="nature-vibrant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vie Équilibrée - Fandry</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap" rel="stylesheet">
    
    <!-- FIREBASE COMPAT SDK (Strictement asynchrone classique, pas de module) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <style>
        /* THEMES & VARIABLES CSS */
        :root {
            --font-title: 'DM Serif Display', serif;
            --font-text: 'DM Sans', sans-serif;
            --font-mono: 'DM Mono', monospace;
            --sidebar-width: 250px;
            --right-panel-width: 350px; /* Élargi pour le Split-Screen */
            --transition: all 0.3s ease;
        }

        /* PALETTE DEMANDÉE : Nature Vibrant */
        [data-theme="nature-vibrant"] {
            --bg: linear-gradient(135deg, #05668d 0%, #427aa1 100%);
            --surface: #ebf2fa;
            --surface-hover: #ffffff;
            --text: #05668d;
            --text-muted: #427aa1;
            --primary: #679436;
            --secondary: #a5be00;
            --accent: #427aa1;
            --border: rgba(5, 102, 141, 0.15);
            --gold: #a5be00;
            --green: #679436;
            --danger: #e63946;
            --card-shadow: 0 10px 25px rgba(5, 102, 141, 0.25);
            --header-text: #ebf2fa;
        }

        /* Thèmes alternatifs conservés pour les paramètres */
        [data-theme="dark"] { --bg: #121212; --surface: #1E1E1E; --surface-hover: #2C2C2C; --text: #E0E0E0; --text-muted: #9E9E9E; --primary: #BB86FC; --secondary: #03DAC6; --border: #333333; --card-shadow: 0 4px 6px rgba(0,0,0,0.3); --header-text: #E0E0E0; }
        [data-theme="light"] { --bg: #F5F5F5; --surface: #FFFFFF; --surface-hover: #E0E0E0; --text: #121212; --text-muted: #666666; --primary: #6200EE; --secondary: #018786; --border: #DDDDDD; --card-shadow: 0 4px 6px rgba(0,0,0,0.1); --header-text: #121212; }
        [data-theme="ocean-ice"] { --bg: linear-gradient(135deg, #1B4965 0%, #5FA8D3 100%); --surface: #CAE9FF; --surface-hover: #BEE9E8; --text: #1B4965; --text-muted: #62B6CB; --primary: #1B4965; --secondary: #62B6CB; --border: rgba(27,73,101,0.2); --card-shadow: 0 10px 25px rgba(27,73,101,0.15); --header-text: #CAE9FF; }
        [data-theme="deep-blue"] { --bg: #0D1B2A; --surface: #1B263B; --surface-hover: #415A77; --text: #E0E1DD; --text-muted: #778DA9; --primary: #778DA9; --secondary: #415A77; --border: #415A77; --card-shadow: 0 10px 25px rgba(0,0,0,0.3); --header-text: #E0E1DD; }
        [data-theme="terracotta"] { --bg: #EEE2DF; --surface: #F5EBE0; --surface-hover: #EED7C5; --text: #B36A5E; --text-muted: #C89F9C; --primary: #C97C5D; --secondary: #C89F9C; --border: rgba(179,106,94,0.2); --card-shadow: 0 10px 25px rgba(179,106,94,0.15); --header-text: #B36A5E; }
        [data-theme="neutral-nude"] { --bg: #EDEDE9; --surface: #F5EBE0; --surface-hover: #E3D5CA; --text: #6B5E55; --text-muted: #D5BDAF; --primary: #D5BDAF; --secondary: #D6CCC2; --border: #D6CCC2; --card-shadow: 0 10px 25px rgba(214,204,194,0.2); --header-text: #6B5E55; }
        [data-theme="forest"] { --bg: #DAD7CD; --surface: #F2F1ED; --surface-hover: #A3B18A; --text: #344E41; --text-muted: #588157; --primary: #3A5A40; --secondary: #588157; --border: rgba(52,78,65,0.2); --card-shadow: 0 10px 25px rgba(52,78,65,0.15); --header-text: #344E41; }

        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: var(--font-text); 
            background: var(--bg); 
            background-attachment: fixed; 
            color: var(--text); 
            overflow-x: hidden; 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        h1, h2, h3 { font-family: var(--font-title); font-weight: normal; }
        .mono { font-family: var(--font-mono); }
        
        button { 
            cursor: pointer; border: none; outline: none; background: var(--primary); 
            color: #ffffff; padding: 12px 20px; border-radius: 16px; font-weight: bold; 
            font-family: var(--font-text); transition: var(--transition); 
            box-shadow: 0 4px 10px rgba(103, 148, 54, 0.3);
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button.outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); box-shadow: none; }
        
        input, select, textarea { 
            width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 16px; 
            border: 1px solid var(--border); background: rgba(255,255,255,0.7); 
            color: var(--text); font-family: var(--font-text); transition: var(--transition); 
        }
        input:focus { outline: none; border-color: var(--primary); background: var(--surface); box-shadow: 0 0 0 3px rgba(103, 148, 54, 0.2); }
        
        /* LAYOUT */
        #app-container { display: flex; flex: 1; height: 100vh; overflow: hidden; }
        
        .sidebar { width: var(--sidebar-width); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 0; overflow-y: auto; }
        .sidebar a { padding: 12px 20px; color: var(--text-muted); text-decoration: none; display: block; border-left: 4px solid transparent; transition: var(--transition); font-weight: 500; }
        .sidebar a:hover, .sidebar a.active { color: var(--primary); border-left-color: var(--primary); background: rgba(103, 148, 54, 0.1); }
        .sidebar h4 { padding: 10px 20px; margin-top: 15px; font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { height: 70px; background: transparent; color: var(--header-text); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .topbar button.outline { border-color: var(--header-text); color: var(--header-text); }
        .content-area { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 110px; } /* Espace pour la bottom nav */

        .right-panel { width: var(--right-panel-width); background: var(--surface); border-left: 1px solid var(--border); padding: 25px; overflow-y: auto; display: none; }
        @media (min-width: 1024px) { .right-panel { display: block; } } /* Activé plus tôt (Laptops/Desktops) pour le Split-Screen */

        /* NAVIGATION FLOTTANTE MOBILE */
        .bottom-nav { 
            display: none; background: var(--surface); border-radius: 35px; 
            margin: 15px; box-shadow: var(--card-shadow); padding: 8px 15px; 
            align-items: center; justify-content: space-between; position: fixed; 
            bottom: 0; left: 0; right: 0; z-index: 100; border: 1px solid rgba(255,255,255,0.5); 
            backdrop-filter: blur(10px); 
        }
        .bottom-nav button { 
            background: transparent; color: var(--text-muted); font-size: 1.4rem; 
            padding: 10px; border-radius: 20px; flex: 1; display: flex; 
            justify-content: center; align-items: center; box-shadow: none;
        }
        .bottom-nav button:hover, .bottom-nav button.active { 
            color: var(--primary); background: rgba(103, 148, 54, 0.1); transform: none; 
        }
        /* Le gros bouton central (FAB) */
        .bottom-nav .fab { 
            background: linear-gradient(135deg, var(--secondary), var(--primary)); 
            color: white; width: 64px; height: 64px; max-width: 64px; 
            border-radius: 50%; transform: translateY(-25px); 
            box-shadow: 0 10px 20px rgba(103, 148, 54, 0.4); 
            border: 5px solid #427aa1; font-size: 1.8rem; 
            display: flex; align-items: center; justify-content: center;
        }
        .bottom-nav .fab:hover { transform: translateY(-28px) scale(1.05); }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .bottom-nav { display: flex; }
            .topbar h2 { font-size: 1.2rem; }
        }

        /* COMPONENTS */
        .card { 
            background: var(--surface); border-radius: 24px; padding: 20px; 
            margin-bottom: 20px; border: none; box-shadow: var(--card-shadow); 
            position: relative; overflow: hidden; 
        }
        .card h3 { margin-bottom: 15px; padding-bottom: 5px; color: var(--text); font-weight: bold; font-family: var(--font-text); font-size: 1.1rem; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } }
        
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .text-center { text-align: center; }
        
        /* Strip Calendrier */
        .calendar-strip { display: flex; overflow-x: auto; padding-bottom: 15px; gap: 12px; scrollbar-width: none; }
        .calendar-strip::-webkit-scrollbar { display: none; }
        .day-box { 
            min-width: 55px; text-align: center; padding: 12px 5px; border-radius: 18px; 
            background: rgba(235, 242, 250, 0.2); border: 1px solid rgba(255,255,255,0.3); 
            cursor: pointer; color: var(--header-text); backdrop-filter: blur(5px); transition: var(--transition); 
        }
        .day-box.active { 
            background: var(--surface); color: var(--text); font-weight: bold; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); border-color: var(--surface); transform: scale(1.05); 
        }
        .day-box .dot { width: 6px; height: 6px; background: var(--secondary); border-radius: 50%; margin: 5px auto 0; display: none; }
        .day-box.has-data .dot { display: block; }

        /* Progress Bar */
        .progress-bar { height: 14px; background: rgba(5, 102, 141, 0.1); border-radius: 7px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--secondary), var(--primary)); width: 0%; transition: width 0.5s ease; border-radius: 7px; }

        /* Messages */
        .error-msg { color: var(--danger); background: rgba(230, 57, 70, 0.1); padding: 15px; border-radius: 16px; border: 1px solid var(--danger); margin-bottom: 15px; }
        .success-msg { color: var(--green); background: rgba(103, 148, 54, 0.1); padding: 15px; border-radius: 16px; border: 1px solid var(--green); margin-bottom: 15px; }

        /* Auth Screen */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: var(--bg); }
        .auth-box { background: var(--surface); padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; text-align: center; box-shadow: var(--card-shadow); }
    </style>
</head>
<body>

    <!-- AUTHENTIFICATION -->
    <div id="auth-screen">
        <div class="auth-box">
            <h1 style="color: var(--text); margin-bottom: 10px;">Vie Équilibrée</h1>
            <p style="margin-bottom: 30px; color: var(--text-muted);">Connexion sécurisée</p>
            <input type="email" id="auth-email" placeholder="Email (ex: fandryjoh@gmail.com)">
            <input type="password" id="auth-pwd" placeholder="Mot de passe">
            <button onclick="appLogin()" style="width: 100%; margin-bottom: 15px; padding: 14px; font-size: 1.1rem;">Se connecter</button>
            <div id="auth-error" class="error-msg" style="display: none;"></div>
        </div>
    </div>

    <!-- APPLICATION PRINCIPALE -->
    <div id="app-container" style="display: none;">
        
        <!-- SIDEBAR (Desktop) -->
        <nav class="sidebar">
            <div style="padding: 0 20px 20px;">
                <h2 style="color: var(--primary); font-size: 1.8rem; margin-bottom: 5px;">Vie Équilibrée</h2>
                <div style="font-size: 0.85em; color: var(--text-muted); background: rgba(5, 102, 141, 0.1); padding: 5px 10px; border-radius: 10px; display: inline-block;" id="user-chip"></div>
            </div>
            <h4>Quotidien</h4>
            <a href="#" onclick="nav('jour')" id="nav-jour">🏠 Jour</a>
            <a href="#" onclick="nav('semaine')" id="nav-semaine">📅 Semaine</a>
            <a href="#" onclick="nav('mois')" id="nav-mois">📊 Mois</a>
            <h4>Finances</h4>
            <a href="#" onclick="nav('courses')" id="nav-courses">🛒 Courses</a>
            <a href="#" onclick="nav('revenus')" id="nav-revenus">💰 Revenus & Fonds</a>
            <a href="#" onclick="nav('stats')" id="nav-stats">📈 Statistiques</a>
            <h4>Gestion</h4>
            <a href="#" onclick="nav('taches')" id="nav-taches">✅ Tâches</a>
            <a href="#" onclick="nav('objectifs')" id="nav-objectifs">🎯 Objectifs</a>
            <a href="#" onclick="nav('journal')" id="nav-journal">📝 Journal</a>
            <a href="#" onclick="nav('bienetre')" id="nav-bienetre">🧘 Bien-être</a>
            <a href="#" onclick="nav('planning')" id="nav-planning">⏰ Planning</a>
            <h4>Compte</h4>
            <a href="#" onclick="nav('settings')" id="nav-settings">⚙️ Paramètres</a>
            <a href="#" onclick="nav('admin')" id="nav-admin" style="display:none;">🔒 Admin</a>
            <a href="#" onclick="appLogout()" style="margin-top: 20px; color: var(--danger);">Déconnexion</a>
        </nav>

        <div class="main-wrapper">
            <!-- TOPBAR -->
            <header class="topbar">
                <div class="flex-between" style="width: 220px;">
                    <button class="outline" onclick="changeMonth(-1)" style="padding: 8px 15px; border-radius: 12px; color: white; border-color: rgba(255,255,255,0.5);">‹</button>
                    <h3 id="current-month-display" style="font-family: var(--font-text); font-weight: bold; font-size: 1.1rem;">Juin 2026</h3>
                    <button class="outline" onclick="changeMonth(1)" style="padding: 8px 15px; border-radius: 12px; color: white; border-color: rgba(255,255,255,0.5);">›</button>
                </div>
                <div class="flex-between">
                    <div id="sync-status" style="margin-right: 15px; font-size: 0.8em; opacity: 0.8;">Sync ✓</div>
                    <svg width="45" height="45" viewBox="0 0 40 40">
                        <circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="4"/>
                        <circle id="day-progress-ring" cx="20" cy="20" r="16" fill="none" stroke="var(--secondary)" stroke-width="4" stroke-dasharray="100 100" stroke-dashoffset="100" transform="rotate(-90 20 20)"/>
                    </svg>
                </div>
            </header>

            <!-- CONTENT -->
            <main class="content-area" id="main-content">
                <!-- Rendu dynamique ici -->
            </main>
        </div>

        <!-- RIGHT PANEL (Desktop > 1200px) -->
        <aside class="right-panel" id="right-panel">
            <!-- Rendu dynamique des widgets ici -->
        </aside>

        <!-- BOTTOM NAV FLOTTANTE (Mobile) -->
        <nav class="bottom-nav">
            <button onclick="nav('jour')" id="mob-jour">🏠</button>
            <button onclick="nav('taches')" id="mob-taches">✅</button>
            <button class="fab" onclick="nav('jour')">⚡</button>
            <button onclick="nav('revenus')" id="mob-revenus">💰</button>
            <button onclick="nav('settings')" id="mob-settings">⚙️</button>
        </nav>
    </div>

    <!-- SCRIPT PRINCIPAL -->
    <script>
        /**
         * WIDGETS DU PANNEAU DROIT (Version Desktop - Split-Screen Option 2)
         */
        function renderRightPanel() {
            var rp = document.getElementById('right-panel');
            if (!rp) return;
            var h = [];
            
            var todayInt = State.activeDate.getDate();
            var dayData = getDayData(todayInt);
            
            // Calcul du budget pour le widget
            var env = State.C.dayBudget || 20000;
            var spent = 0;
            if (dayData.spendings) {
                for (var j=0; j<dayData.spendings.length; j++) spent += Number(dayData.spendings[j].amt || 0);
            }
            var reste = env - spent;
            var progress = Math.min(100, (spent/env)*100);
            
            h.push("<h2 style='margin-bottom: 20px; font-weight: bold; font-family: var(--font-title); color: var(--primary);'>Résumé & Actions</h2>");
            
            // 1. CARTE SCORE GLOBAL (Bleu profond typique de l'Option 2)
            h.push("<div class='card' style='text-align:center; background: linear-gradient(135deg, #05668d, #427aa1); color: white; border: none; box-shadow: 0 10px 20px rgba(5, 102, 141, 0.3);'>");
            h.push("<h3 style='color: rgba(255,255,255,0.9); border:none; margin-bottom:5px; font-size: 1.1rem;'>Score Global</h3>");
            h.push("<h1 style='font-size:4.5em; font-weight:bold; margin:0; line-height: 1;'>85<span style='font-size:0.4em;'>%</span></h1>");
            h.push("<p style='font-size:0.85em; opacity:0.8; margin-top: 10px;'>Excellente dynamique !</p>");
            h.push("</div>");
            
            // 2. CARTE BUDGET (Suivi express)
            h.push("<div class='card' style='border: 1px solid var(--border); box-shadow: var(--card-shadow);'>");
            h.push("<div class='flex-between' style='margin-bottom: 15px;'>");
            h.push("<h3 style='margin: 0; padding: 0; border: none; font-size: 1.1rem; color: var(--primary);'>Budget du jour</h3>");
            h.push("<button class='outline' style='padding:6px 10px; font-size:0.8em; border-radius: 10px;' onclick='nav(\"jour\")'>+ Ajouter</button>");
            h.push("</div>");
            h.push("<div class='flex-between' style='font-size:0.95em; margin-bottom:8px;'><span style='color:var(--text-muted);'>Dépensé</span> <strong class='mono'>" + fmtAr(spent) + "</strong></div>");
            h.push("<div class='flex-between' style='font-size:1.1em; margin-bottom:12px;'><span style='color:var(--text);'>Reste</span> <strong class='mono' style='color:" + (reste<0?'var(--danger)':'var(--primary)') + "'>" + fmtAr(reste) + "</strong></div>");
            h.push("<div class='progress-bar' style='height:12px; background: rgba(5, 102, 141, 0.1);'><div class='progress-fill' style='width:" + progress + "%; background: linear-gradient(90deg, var(--secondary), var(--primary));'></div></div>");
            h.push("</div>");

            // 3. CARTE TÂCHES & PLANNING (Quick View)
            h.push("<div class='card' style='border: 1px solid var(--border); box-shadow: var(--card-shadow);'>");
            h.push("<h3 style='border-bottom: none; margin-bottom: 15px; font-size: 1.1rem; color: var(--primary);'>Prochaines Tâches</h3>");
            h.push("<ul style='list-style:none; padding:0; font-size:0.95em;'>");
            h.push("<li style='margin-bottom:12px; padding: 10px; background: rgba(103, 148, 54, 0.1); border-left:4px solid var(--green); border-radius: 0 8px 8px 0;'><strong>GTV:</strong> Réunion d'équipe (14h)</li>");
            h.push("<li style='margin-bottom:12px; padding: 10px; background: rgba(66, 122, 161, 0.1); border-left:4px solid var(--accent); border-radius: 0 8px 8px 0;'><strong>iScale:</strong> Validation Maquette</li>");
            h.push("<li style='margin-bottom:12px; padding: 10px; background: rgba(5, 102, 141, 0.05); border-left:4px solid var(--border); border-radius: 0 8px 8px 0; color:var(--text-muted);'><del>Faire les courses</del></li>");
            h.push("</ul>");
            h.push("<button style='width:100%; margin-top:5px; background: transparent; color: var(--primary); border: 2px solid var(--primary); box-shadow: none;' onclick='nav(\"taches\")'>Gérer mes tâches</button>");
            h.push("</div>");

            rp.innerHTML = h.join("");
        }

        // DÉMARRAGE : Mise à jour de l'anneau de progression du jour (6h-23h)
        updateTimeRing();

    </script>
</body>
</html>
